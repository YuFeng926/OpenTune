      - name: Build VST3 Plugin
        run: |
          mkdir build-vst3
          cd build-vst3
          cmake .. -G "Visual Studio 17 2022" -A x64 -DOPENTUNE_FORMATS=VST3
          cmake --build . --config Release

      - name: Upload VST3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTune-Windows-VST3
          path: build-vst3/OpenTune_artefacts/Release/VST3/
          retention-days: 30

